name: league-simulation

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: league
      POSTGRES_PASSWORD: league123
      POSTGRES_DB: league
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./migrations/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league -d league"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: league
      DB_PASSWORD: league123
      DB_NAME: league
      DB_SSLMODE: disable
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
